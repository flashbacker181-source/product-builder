<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동물상 테스트 🐶🐱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .top-bar {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 100;
    }
    #lottoBtn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      height: 44px;
      padding: 0 14px;
      border-radius: 22px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      text-decoration: none;
    }
    #lottoBtn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 36px;
      font-size: 0.95rem;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* 업로드 영역 */
    .upload-area {
      width: 100%;
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
    }
    .upload-area:hover {
      border-color: #e94560;
      background: rgba(233,69,96,0.05);
    }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 3rem; margin-bottom: 10px; }
    .upload-text { color: #aaa; font-size: 0.9rem; }

    /* 미리보기 이미지 */
    #previewBox {
      display: none;
      width: 100%;
      text-align: center;
    }
    #previewImg {
      max-width: 100%;
      max-height: 280px;
      border-radius: 14px;
      object-fit: contain;
    }

    /* 분석 버튼 */
    #analyzeBtn {
      display: none;
      background: linear-gradient(135deg, #e94560, #c23152);
      border: none;
      color: #fff;
      padding: 14px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
      width: 100%;
    }
    #analyzeBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(233,69,96,0.6);
    }
    #analyzeBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 로딩 */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 */
    #resultBox {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-animal {
      font-size: 5rem;
      line-height: 1;
    }
    .result-title {
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
    }
    .result-title.dog { color: #fbc531; }
    .result-title.cat { color: #a29bfe; }

    .result-desc {
      color: #ccc;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* 퍼센트 바 */
    .bars {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bar-label {
      font-size: 1.3rem;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border-radius: 50px;
      height: 14px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 50px;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bar-fill.dog { background: linear-gradient(90deg, #f9ca24, #fbc531); }
    .bar-fill.cat { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }
    .bar-pct {
      font-size: 0.85rem;
      color: #aaa;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    /* 특성 태그 */
    .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .trait {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #ddd;
    }

    /* 다시하기 버튼 */
    #retryBtn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 12px 32px;
      font-size: 0.95rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    #retryBtn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .hint {
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html" id="lottoBtn">🎱 로또 번호 추천기</a>
  </div>

  <h1>🐶🐱 동물상 테스트</h1>
  <p class="subtitle">사진을 올리면 AI가 당신의 동물상을 분석해드려요!</p>

  <div class="card">

    <!-- 업로드 영역 -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">📸</div>
      <div style="font-size:1rem; margin-bottom:6px;">사진을 업로드하세요</div>
      <div class="upload-text">클릭하거나 파일을 드래그해서 올려주세요</div>
    </div>

    <!-- 미리보기 -->
    <div id="previewBox">
      <img id="previewImg" src="" alt="미리보기">
    </div>

    <!-- 분석 버튼 -->
    <button id="analyzeBtn">✨ 동물상 분석하기</button>

    <!-- 로딩 -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="color:#aaa; font-size:0.9rem;">AI가 열심히 분석 중이에요...</p>
    </div>

    <!-- 결과 -->
    <div id="resultBox">
      <div class="result-animal" id="resultAnimal"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="bars">
        <div class="bar-row">
          <span class="bar-label">🐶</span>
          <div class="bar-track"><div class="bar-fill dog" id="dogBar" style="width:0%"></div></div>
          <span class="bar-pct" id="dogPct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">🐱</span>
          <div class="bar-track"><div class="bar-fill cat" id="catBar" style="width:0%"></div></div>
          <span class="bar-pct" id="catPct">0%</span>
        </div>
      </div>
      <div class="traits" id="traits"></div>
      <button id="retryBtn">🔄 다시 테스트하기</button>
    </div>

  </div>

  <p class="hint" style="margin-top:16px;">* 얼굴이 잘 나온 사진일수록 정확해요</p>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/NWOnOPeF4/';

    const DATA = {
      dog: {
        emoji: '🐶',
        title: '강아지상',
        titleClass: 'dog',
        descs: [
          '활발하고 따뜻한 에너지가 넘치는 당신!\n주변 사람들에게 언제나 사랑받는 타입이에요.\n충성스럽고 다정한 매력으로 사람들을 끌어당겨요.',
          '밝은 미소와 순수한 눈빛이 매력적인 당신!\n함께 있으면 기분이 좋아지는 특별한 분위기를 가졌어요.',
        ],
        traits: ['활발함', '다정함', '충성스러움', '사교적', '긍정적'],
      },
      cat: {
        emoji: '🐱',
        title: '고양이상',
        titleClass: 'cat',
        descs: [
          '신비롭고 독립적인 매력의 소유자!\n자신만의 개성으로 사람들의 시선을 사로잡아요.\n쿨한 듯 하지만 알고 보면 따뜻한 속마음이 있어요.',
          '지적이고 세련된 분위기가 흐르는 당신!\n자기 관리를 잘 하고 감성이 풍부한 타입이에요.',
        ],
        traits: ['신비로움', '독립적', '지적임', '세련됨', '감성적'],
      },
    };

    let model = null;
    let selectedFile = null;

    const fileInput   = document.getElementById('fileInput');
    const uploadArea  = document.getElementById('uploadArea');
    const previewBox  = document.getElementById('previewBox');
    const previewImg  = document.getElementById('previewImg');
    const analyzeBtn  = document.getElementById('analyzeBtn');
    const loading     = document.getElementById('loading');
    const resultBox   = document.getElementById('resultBox');
    const retryBtn    = document.getElementById('retryBtn');

    // 파일 선택
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewBox.style.display = 'block';
      uploadArea.style.display = 'none';
      analyzeBtn.style.display = 'block';
      resultBox.style.display = 'none';
    });

    // 드래그&드롭
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#e94560'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewBox.style.display = 'block';
      uploadArea.style.display = 'none';
      analyzeBtn.style.display = 'block';
      resultBox.style.display = 'none';
    });

    // 분석
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      analyzeBtn.style.display = 'none';
      previewBox.style.display = 'none';
      loading.style.display = 'flex';

      try {
        if (!model) {
          model = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
        }

        await previewImg.decode().catch(() => {});
        const predictions = await model.predict(previewImg);

        // 클래스 이름으로 dog/cat 판별
        let dogScore = 0, catScore = 0;
        predictions.forEach(p => {
          const name = p.className.toLowerCase();
          if (name.includes('dog') || name.includes('강아지')) dogScore = p.probability;
          else if (name.includes('cat') || name.includes('고양이')) catScore = p.probability;
        });

        // 합산이 0이면 첫번째=dog, 두번째=cat으로 처리
        if (dogScore === 0 && catScore === 0 && predictions.length >= 2) {
          dogScore = predictions[0].probability;
          catScore = predictions[1].probability;
        }

        showResult(dogScore, catScore);
      } catch (err) {
        console.error(err);
        loading.style.display = 'none';
        alert('분석 중 오류가 발생했어요. 다른 사진으로 다시 시도해주세요.');
        resetUI();
      }
    });

    function showResult(dogScore, catScore) {
      loading.style.display = 'none';

      const total = dogScore + catScore || 1;
      const dogPct = Math.round((dogScore / total) * 100);
      const catPct = 100 - dogPct;

      const winner = dogPct >= catPct ? 'dog' : 'cat';
      const d = DATA[winner];

      document.getElementById('resultAnimal').textContent = d.emoji;
      document.getElementById('resultTitle').textContent = d.title;
      document.getElementById('resultTitle').className = 'result-title ' + d.titleClass;
      document.getElementById('resultDesc').textContent =
        d.descs[Math.floor(Math.random() * d.descs.length)].replace(/\n/g, '\n');

      document.getElementById('dogPct').textContent = dogPct + '%';
      document.getElementById('catPct').textContent = catPct + '%';

      // 트레이트
      const traitsEl = document.getElementById('traits');
      traitsEl.innerHTML = '';
      d.traits.forEach(t => {
        const span = document.createElement('span');
        span.className = 'trait';
        span.textContent = '# ' + t;
        traitsEl.appendChild(span);
      });

      resultBox.style.display = 'flex';

      // 바 애니메이션 (딜레이 후 적용)
      setTimeout(() => {
        document.getElementById('dogBar').style.width = dogPct + '%';
        document.getElementById('catBar').style.width = catPct + '%';
      }, 100);
    }

    function resetUI() {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src = '';
      previewBox.style.display = 'none';
      analyzeBtn.style.display = 'none';
      loading.style.display = 'none';
      resultBox.style.display = 'none';
      uploadArea.style.display = 'block';
      document.getElementById('dogBar').style.width = '0%';
      document.getElementById('catBar').style.width = '0%';
    }

    retryBtn.addEventListener('click', resetUI);
  </script>
</body>
</html>
