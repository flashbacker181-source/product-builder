  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

    }

    .container { width: 100%; max-width: 700px; }

    /* 입력 폼 */
    .input-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 30px;

    .input-group.full { grid-column: 1 / -1; }

      font-size: 0.85rem;

    .input-group input, .input-group select {

      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);

    @keyframes slideIn {

    .summary-grid {

      grid-template-columns: repeat(2, 1fr);

    .result-table {
      width: 100%;
      border-collapse: collapse;

    }
    .result-table th {
      background: rgba(255,215,0,0.08);

      text-align: right;

    .table-section h3 {

    @media (max-width: 500px) {
      .input-grid { grid-template-columns: 1fr; }

  <h1>📈 주식 투자 백테스트</h1>

  <script>
    // 테마 관리
    const savedTheme = localStorage.getItem('lottoTheme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateToggleIcon(savedTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lottoTheme', next);
      updateToggleIcon(next);
    });

    function updateToggleIcon(theme) {
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    // 숫자 포맷
    function formatKRW(n) {
      if (Math.abs(n) >= 100000000) {
        return (n / 100000000).toFixed(2) + '억';
      } else if (Math.abs(n) >= 10000) {
        return (n / 10000).toFixed(0) + '만';
      }
      return n.toLocaleString('ko-KR');
    }

    function formatFullKRW(n) {
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }

    // 시뮬레이션
    let lastYearlyData = null;
    let lastMonthlyData = null;
    let lastReinvest = true;
    let currentView = 'yearly';

    document.getElementById('simulateBtn').addEventListener('click', runSimulation);

    function switchView(view) {
      currentView = view;
      document.getElementById('yearlyBtn').classList.toggle('active', view === 'yearly');
      document.getElementById('monthlyBtn').classList.toggle('active', view === 'monthly');
      if (lastYearlyData) {
        renderTable(view === 'yearly' ? lastYearlyData : lastMonthlyData, view);
      }
    }

    function runSimulation() {
      const startPrice = parseFloat(document.getElementById('startPrice').value);
      const initInvest = parseFloat(document.getElementById('initInvest').value);
      const annualGrowth = parseFloat(document.getElementById('growthRate').value) / 100;
      const annualDividend = parseFloat(document.getElementById('dividendRate').value) / 100;
      const monthlyAdd = parseFloat(document.getElementById('monthlyAdd').value);
      const reinvest = document.getElementById('dividendReinvest').value === 'reinvest';

      if (!startPrice || startPrice <= 0) { alert('시작 주가를 올바르게 입력해주세요.'); return; }
      if (initInvest < 0) { alert('시작 투자금을 올바르게 입력해주세요.'); return; }

      const monthlyGrowth = Math.pow(1 + annualGrowth, 1/12) - 1;
      const years = 10;

      let currentPrice = startPrice;
      let shares = initInvest / startPrice;
      let totalInvested = initInvest;
      let totalDividendReceived = 0;
      let yearlyData = [];
      let monthlyData = [];

      // 0년차(0월) 기록
      const initRecord = {
        year: 0, month: 0,
        label: '시작',
        price: startPrice,
        shares: shares,
        invested: initInvest,
        monthlyAddAmount: 0,
        dividendThisMonth: 0,
        dividendThisYear: 0,
        totalDividend: 0,
        portfolioValue: shares * startPrice,
        totalAsset: shares * startPrice,
        profit: 0,
        profitRate: 0
      };
      yearlyData.push(initRecord);
      monthlyData.push(initRecord);

      const monthlyDividendRate = annualDividend / 12;

      for (let y = 1; y <= years; y++) {
        let dividendThisYear = 0;

        for (let m = 1; m <= 12; m++) {
          // 주가 성장 (월별)
          currentPrice = currentPrice * (1 + monthlyGrowth);

          // 월 적립 매수
          let addedThisMonth = 0;
          if (monthlyAdd > 0) {
            const newShares = monthlyAdd / currentPrice;
            shares += newShares;
            totalInvested += monthlyAdd;
            addedThisMonth = monthlyAdd;
          }

          // 월 배당 지급
          const portfolioValueBeforeDividend = shares * currentPrice;
          const dividend = portfolioValueBeforeDividend * monthlyDividendRate;
          const dividendThisMonth = dividend;
          dividendThisYear += dividend;
          totalDividendReceived += dividend;

          if (reinvest && dividend > 0) {
            const dividendShares = dividend / currentPrice;
            shares += dividendShares;
          }

          const portfolioValue = shares * currentPrice;
          const totalAsset = reinvest ? portfolioValue : portfolioValue + totalDividendReceived;
          const profit = totalAsset - totalInvested;
          const profitRate = totalInvested > 0 ? (profit / totalInvested) * 100 : 0;

          const totalMonths = (y - 1) * 12 + m;
          const labelYear = Math.floor(totalMonths / 12);
          const labelMonth = totalMonths % 12;
          const label = labelMonth === 0 ? labelYear + '년' : labelYear + '년 ' + labelMonth + '개월';

          const record = {
            year: y, month: m,
            label: label,
            price: currentPrice,
            shares: shares,
            invested: totalInvested,
            monthlyAddAmount: addedThisMonth,
            dividendThisMonth: dividendThisMonth,
            dividendThisYear: dividendThisYear,
            totalDividend: totalDividendReceived,
            portfolioValue: portfolioValue,
            totalAsset: totalAsset,
            profit: profit,
            profitRate: profitRate
          };

          monthlyData.push(record);

          // 12월이면 연간 데이터에도 추가
          if (m === 12) {
            yearlyData.push(record);
          }
        }
      }

      lastYearlyData = yearlyData;
      lastMonthlyData = monthlyData;
      lastReinvest = reinvest;

      displayResults(yearlyData, monthlyData, reinvest);
    }

    function displayResults(yearlyData, monthlyData, reinvest) {
      const section = document.getElementById('resultSection');
      section.classList.add('visible');

      const last = yearlyData[yearlyData.length - 1];
      const profitClass = last.profit >= 0 ? 'positive' : 'negative';
      const profitSign = last.profit >= 0 ? '+' : '';

      // 요약 카드
      const summaryGrid = document.getElementById('summaryGrid');
      summaryGrid.innerHTML = `
        <div class="summary-card highlight">
          <div class="summary-value ${profitClass}">${formatFullKRW(last.totalAsset)}</div>
          <div class="summary-label">최종 자산</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${formatFullKRW(last.invested)}</div>
          <div class="summary-label">총 투자 원금</div>
        </div>
        <div class="summary-card">
          <div class="summary-value ${profitClass}">${profitSign}${formatFullKRW(last.profit)}</div>
          <div class="summary-label">총 수익금</div>
        </div>
        <div class="summary-card">
          <div class="summary-value ${profitClass}">${profitSign}${last.profitRate.toFixed(1)}%</div>
          <div class="summary-label">총 수익률</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${formatFullKRW(last.totalDividend)}</div>
          <div class="summary-label">누적 배당금</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${last.shares.toFixed(2)}주</div>
          <div class="summary-label">최종 보유 주식 수</div>
        </div>
      `;

      // 테이블 렌더링
      renderTable(currentView === 'yearly' ? yearlyData : monthlyData, currentView);

      // 차트 그리기 (월별 데이터로 더 부드럽게)
      drawChart(monthlyData);

      // 스크롤
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderTable(data, view) {
      const table = document.getElementById('resultTable');
      const isCashMode = !lastReinvest;

      if (view === 'monthly') {
        table.querySelector('thead').innerHTML = `
          <tr>
            <th>시점</th>
            <th>주가</th>
            <th>보유주식</th>
            <th>월적립</th>
            <th>투자원금</th>
            <th>배당금</th>
            ${isCashMode ? '<th>주식평가</th><th>총자산</th>' : '<th>총자산</th>'}
            <th>수익률</th>
          </tr>
        `;
      } else {
        table.querySelector('thead').innerHTML = `
          <tr>
            <th>연차</th>
            <th>주가</th>
            <th>보유주식</th>
            <th>투자원금</th>
            <th>연배당금</th>
            ${isCashMode ? '<th>주식평가</th><th>총자산</th>' : '<th>총자산</th>'}
            <th>수익률</th>
          </tr>
        `;
      }

      const tbody = table.querySelector('tbody');
      tbody.innerHTML = '';

      data.forEach(d => {
        const rateClass = d.profitRate >= 0 ? 'color:var(--positive)' : 'color:var(--negative)';
        const sign = d.profitRate >= 0 ? '+' : '';
        const tr = document.createElement('tr');
        const assetCols = isCashMode
          ? `<td>${formatKRW(d.portfolioValue)}원</td><td>${formatKRW(d.totalAsset)}원</td>`
          : `<td>${formatKRW(d.totalAsset)}원</td>`;

        if (view === 'monthly') {
          if (d.month === 12) tr.classList.add('year-row');
          tr.innerHTML = `
            <td>${d.label}</td>
            <td>${formatFullKRW(d.price)}</td>
            <td>${d.shares.toFixed(2)}</td>
            <td>${d.monthlyAddAmount > 0 ? formatKRW(d.monthlyAddAmount) + '원' : '-'}</td>
            <td>${formatKRW(d.invested)}원</td>
            <td>${d.dividendThisMonth > 0 ? formatKRW(d.dividendThisMonth) + '원' : '-'}</td>
            ${assetCols}
            <td style="${rateClass};font-weight:600">${sign}${d.profitRate.toFixed(1)}%</td>
          `;
        } else {
          tr.innerHTML = `
            <td>${d.label}</td>
            <td>${formatFullKRW(d.price)}</td>
            <td>${d.shares.toFixed(2)}</td>
            <td>${formatKRW(d.invested)}원</td>
            <td>${formatKRW(d.dividendThisYear)}원</td>
            ${assetCols}
            <td style="${rateClass};font-weight:600">${sign}${d.profitRate.toFixed(1)}%</td>
          `;
        }
        tbody.appendChild(tr);
      });
    }

    // 캔버스 차트 (라이브러리 없이)
    function drawChart(data) {
      const canvas = document.getElementById('growthChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(dpr, dpr);

      const W = rect.width;
      const H = rect.height;
      const pad = { top: 30, right: 20, bottom: 40, left: 70 };
      const chartW = W - pad.left - pad.right;
      const chartH = H - pad.top - pad.bottom;

      ctx.clearRect(0, 0, W, H);

      const totalAssets = data.map(d => d.totalAsset);
      const investeds = data.map(d => d.invested);
      const allValues = [...totalAssets, ...investeds];
      const maxVal = Math.max(...allValues) * 1.1;
      const minVal = 0;

      const theme = document.documentElement.getAttribute('data-theme');
      const textColor = theme === 'dark' ? '#aaa' : '#777';
      const gridColor = theme === 'dark' ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

      // Y축 그리드
      ctx.font = '11px Segoe UI, sans-serif';
      ctx.textAlign = 'right';
      const gridLines = 5;
      for (let i = 0; i <= gridLines; i++) {
        const val = minVal + (maxVal - minVal) * (i / gridLines);
        const y = pad.top + chartH - (chartH * (i / gridLines));
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + chartW, y);
        ctx.stroke();

        ctx.fillStyle = textColor;
        ctx.fillText(formatKRW(val), pad.left - 8, y + 4);
      }

      // X축 라벨 (연 단위로만 표시)
      ctx.textAlign = 'center';
      data.forEach((d, i) => {
        if (d.month === 0 || d.month === 12) {
          const x = pad.left + (chartW * i / (data.length - 1));
          ctx.fillStyle = textColor;
          ctx.fillText(d.year + '년', x, H - pad.bottom + 20);
        }
      });

      function getY(val) {
        return pad.top + chartH - (chartH * ((val - minVal) / (maxVal - minVal)));
      }
      function getX(i) {
        return pad.left + (chartW * i / (data.length - 1));
      }

      // 투자원금 영역
      ctx.beginPath();
      ctx.moveTo(getX(0), getY(0));
      investeds.forEach((v, i) => ctx.lineTo(getX(i), getY(v)));
      ctx.lineTo(getX(data.length - 1), getY(0));
      ctx.closePath();
      ctx.fillStyle = theme === 'dark' ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
      ctx.fill();

      // 투자원금 선
      ctx.beginPath();
      investeds.forEach((v, i) => {
        if (i === 0) ctx.moveTo(getX(i), getY(v));
        else ctx.lineTo(getX(i), getY(v));
      });
      ctx.strokeStyle = theme === 'dark' ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 총자산 영역
      ctx.beginPath();
      ctx.moveTo(getX(0), getY(0));
      totalAssets.forEach((v, i) => ctx.lineTo(getX(i), getY(v)));
      ctx.lineTo(getX(data.length - 1), getY(0));
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
      grad.addColorStop(0, 'rgba(233,69,96,0.25)');
      grad.addColorStop(1, 'rgba(233,69,96,0.02)');
      ctx.fillStyle = grad;
      ctx.fill();

      // 총자산 선
      ctx.beginPath();
      totalAssets.forEach((v, i) => {
        if (i === 0) ctx.moveTo(getX(i), getY(v));
        else ctx.lineTo(getX(i), getY(v));
      });
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // 데이터 포인트 (연 단위만 표시)
      data.forEach((d, i) => {
        if (d.month === 0 || d.month === 12) {
          ctx.beginPath();
          ctx.arc(getX(i), getY(totalAssets[i]), 4, 0, Math.PI * 2);
          ctx.fillStyle = '#e94560';
          ctx.fill();
          ctx.strokeStyle = theme === 'dark' ? '#1a1a2e' : '#f0f4ff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });

      // 범례
      const legendY = 14;
      ctx.font = '12px Segoe UI, sans-serif';

      ctx.fillStyle = '#e94560';
      ctx.fillRect(pad.left, legendY - 8, 16, 3);
      ctx.fillStyle = textColor;
      ctx.textAlign = 'left';
      ctx.fillText('총 자산', pad.left + 22, legendY);

      ctx.strokeStyle = theme === 'dark' ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(pad.left + 100, legendY - 6);
      ctx.lineTo(pad.left + 116, legendY - 6);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = textColor;
      ctx.fillText('투자 원금', pad.left + 122, legendY);
    }

    // 화면 리사이즈 시 차트 다시 그리기
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (document.getElementById('resultSection').classList.contains('visible')) {
          document.getElementById('simulateBtn').click();
        }
      }, 200);
    });
  </script>
</body>
